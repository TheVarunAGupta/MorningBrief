name: Daily Geopolitics Brief

on:
  schedule:
    # GitHub cron is UTC, so run both possible London offsets and gate below.
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render without OpenAI or email sending"
        required: false
        default: "false"
      no_send:
        description: "Analyze but do not send email"
        required: false
        default: "false"
      max_stories:
        description: "Maximum story count"
        required: false
        default: "5"

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      OPENAI_MODEL_DAILY: ${{ vars.OPENAI_MODEL_DAILY || 'gpt-5.4-mini' }}
      OPENAI_MODEL_DEEP: ${{ vars.OPENAI_MODEL_DEEP || 'gpt-5.4' }}
      OPENAI_REQUEST_TIMEOUT_SECONDS: ${{ vars.OPENAI_REQUEST_TIMEOUT_SECONDS || '240' }}
      OPENAI_MAX_RETRIES: ${{ vars.OPENAI_MAX_RETRIES || '2' }}
      MONTHLY_COST_CAP_GBP: ${{ vars.MONTHLY_COST_CAP_GBP || '5' }}
      MAX_STORIES: ${{ inputs.max_stories || '5' }}
    steps:
      - uses: actions/checkout@v6

      - name: Check London delivery time
        id: london_time
        run: python -m newsbot.schedule

      - uses: actions/setup-python@v6
        if: steps.london_time.outputs.should_run == 'true'
        with:
          python-version: "3.12"

      - name: Restore news cache
        if: steps.london_time.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: .cache/newsbot
          key: newsbot-${{ github.run_id }}
          restore-keys: |
            newsbot-

      - name: Run tests
        if: steps.london_time.outputs.should_run == 'true'
        run: python -m unittest discover -s tests

      - name: Build and send brief
        if: steps.london_time.outputs.should_run == 'true'
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ inputs.no_send }}" = "true" ]; then FLAGS="$FLAGS --no-send"; fi
          python -m newsbot run $FLAGS --max-stories "$MAX_STORIES"
